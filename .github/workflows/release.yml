name: Release

# Per the app-release-conventions: test -> package -> attach to a DRAFT release.
# CI stays minimal — the .dmg / setup.exe / portable-zip packaging lives in
# scripts/package.sh (macOS) and scripts/package.ps1 (Windows). Nothing is
# published automatically; a draft is created for the pushed tag, verified, then
# published by hand (gh release edit --draft=false).
#
#   - push a tag `v*` -> build both platforms, attach installers + portables to a
#     single draft release for that tag.
#   - manual dispatch -> build only (no release), for a smoke check.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Gate: a failing test suite means no release is built.
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - run: dotnet test -c Release

  build:
    needs: test
    strategy:
      fail-fast: false # a Windows failure never cancels the macOS build
      matrix:
        include:
          - os: macos-latest
            package: bash scripts/package.sh
          - os: windows-latest
            package: pwsh scripts/package.ps1
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # One command per OS — emits the installer + portable into dist/.
      - name: Package (host OS)
        run: ${{ matrix.package }}

      - name: Attach to draft release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: true
          prerelease: true # 0.x is pre-release
          # Body renders from the pushed tag (${{ github.ref_name }}), so the note
          # never goes stale on a version bump — no release-specific text baked in.
          body: |
            **ScriptDock ${{ github.ref_name }}**

            These builds are unsigned, so the OS warns on first launch:
            - **macOS**: right-click the app → **Open** (or `xattr -dr com.apple.quarantine ScriptDock.app`)
            - **Windows**: SmartScreen → **More info** → **Run anyway**
          files: |
            dist/*.dmg
            dist/*-setup.exe
            dist/*-mac.zip
            dist/*-win.zip
